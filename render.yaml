services:
  - type: web
    name: leadmaps
    env: python
    buildCommand: |
      pip install -r requirements.txt
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.playwright-browsers python -m playwright install chromium
    startCommand: gunicorn app:app
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright-browsers
      - key: STORAGE_MODE
        value: supabase
      - key: APP_SECRET_KEY
        generateValue: true
